<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>운영팀 소개 | 모찌서버</title>
<meta property="og:title" content="운영팀 소개 | 모찌서버">
<meta property="og:description" content="모찌서버를 함께 만들어가는 운영진을 소개합니다.">
<meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/mochi-f81d3.firebasestorage.app/o/site%2Ficon.png?alt=media">
<meta name="theme-color" content="#f4849e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0810;
  --pink:#f4849e;--pd:#e8607e;--peach:#f9a87a;
  --glow:rgba(244,132,158,.4);
  --mu:rgba(255,255,255,.4);
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#fff;font-weight:300;min-height:100vh;overflow-x:hidden}

/* ═══ CINEMATIC BG ═══ */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-scene::before{
  content:'';position:absolute;top:-30%;left:-20%;width:70%;height:90%;
  background:radial-gradient(ellipse,rgba(244,132,158,.08) 0%,transparent 65%);
  animation:drift 20s ease-in-out infinite alternate;
}
.bg-scene::after{
  content:'';position:absolute;bottom:-20%;right:-15%;width:60%;height:80%;
  background:radial-gradient(ellipse,rgba(249,168,122,.06) 0%,transparent 60%);
  animation:drift 25s ease-in-out infinite alternate-reverse;
}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(40px,-30px)}}

/* orbs */
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.5;animation:orbFloat linear infinite}
.orb-1{width:300px;height:300px;background:rgba(244,132,158,.12);top:10%;left:5%;animation-duration:18s}
.orb-2{width:200px;height:200px;background:rgba(249,168,122,.1);top:60%;right:8%;animation-duration:22s;animation-delay:-5s}
.orb-3{width:250px;height:250px;background:rgba(232,96,126,.08);bottom:5%;left:30%;animation-duration:15s;animation-delay:-10s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-40px) scale(1.05)}50%{transform:translateY(10px) scale(.95)}75%{transform:translateY(-20px) scale(1.02)}}

/* grain */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(12,8,16,.6);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid rgba(244,132,158,.1)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:34px;height:34px;border-radius:8px;object-fit:cover;display:none}
.nav-logo-text{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--pd),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-back{font-size:13px;color:var(--mu);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:#fff}

/* ═══ HERO ═══ */
.hero{position:relative;z-index:10;padding:140px 24px 80px;text-align:center}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(244,132,158,.08);border:1px solid rgba(244,132,158,.2);
  padding:6px 18px;border-radius:100px;font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--pink);
  margin-bottom:24px;animation:revealUp .7s ease both;
}
.hero h1{
  font-family:'Nunito',sans-serif;font-size:clamp(40px,6vw,72px);font-weight:900;
  line-height:1.05;letter-spacing:-.03em;margin-bottom:16px;
  animation:revealUp .7s .08s ease both;
}
.hero h1 .grad{background:linear-gradient(135deg,var(--pink),var(--peach));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-desc{font-size:15px;color:var(--mu);line-height:1.8;max-width:460px;margin:0 auto;animation:revealUp .7s .14s ease both}
@keyframes revealUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* ═══ CONTENT ═══ */
.content{position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:0 24px 100px}

/* group header */
.rank-group{margin-bottom:64px;animation:revealUp .6s ease both}
.rank-header{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.rank-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(244,132,158,.15),rgba(249,168,122,.1));
  border:1px solid rgba(244,132,158,.2);
  box-shadow:0 4px 20px rgba(244,132,158,.15);
}
.rank-name{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;letter-spacing:.02em}
.rank-count{font-size:12px;color:var(--mu);font-weight:500;margin-left:4px}
.rank-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(244,132,158,.2),transparent)}

/* cards */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}

.member-card{
  position:relative;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(244,132,158,.1);
  border-radius:20px;
  padding:32px 20px 24px;
  text-align:center;
  transition:all .35s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
/* hover glow */
.member-card::before{
  content:'';position:absolute;inset:-1px;border-radius:20px;
  background:linear-gradient(135deg,rgba(244,132,158,.15),rgba(249,168,122,.1));
  opacity:0;transition:opacity .35s;z-index:0;
}
.member-card::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at center,rgba(244,132,158,.06) 0%,transparent 50%);
  opacity:0;transition:opacity .35s;z-index:0;
}
.member-card:hover{
  transform:translateY(-8px);
  border-color:rgba(244,132,158,.35);
  box-shadow:0 20px 60px rgba(244,132,158,.12),0 0 40px rgba(244,132,158,.06);
}
.member-card:hover::before{opacity:1}
.member-card:hover::after{opacity:1}
.member-card>*{position:relative;z-index:1}

/* avatar */
.avatar-wrap{
  width:84px;height:84px;margin:0 auto 16px;position:relative;
}
.avatar-ring{
  position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--pink),var(--peach),var(--pink));
  opacity:.5;transition:opacity .35s;
}
.member-card:hover .avatar-ring{opacity:1;animation:ringPulse 2s ease-in-out infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(244,132,158,.3)}50%{box-shadow:0 0 0 8px rgba(244,132,158,0)}}
.avatar-img{
  position:relative;width:84px;height:84px;border-radius:50%;object-fit:cover;
  border:3px solid var(--bg);display:block;background:rgba(255,255,255,.05);
}
.avatar-ph{
  position:relative;width:84px;height:84px;border-radius:50%;
  background:linear-gradient(135deg,rgba(244,132,158,.2),rgba(249,168,122,.15));
  border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:rgba(255,255,255,.5);
  font-family:'Nunito',sans-serif;
}

.member-nick{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;margin-bottom:6px}
.member-rank{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;
  padding:3px 12px;border-radius:100px;
  background:rgba(244,132,158,.12);color:var(--pink);
  border:1px solid rgba(244,132,158,.15);margin-bottom:8px;
}
.member-team{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:4px}
.member-discord{font-size:11px;color:rgba(255,255,255,.25);font-family:'Nunito',sans-serif}

/* loading */
.loading-state{text-align:center;padding:80px 20px}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(244,132,158,.15);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--mu)}
.empty-state{text-align:center;padding:80px 20px;color:var(--mu);font-size:14px}

/* footer */
footer{position:relative;z-index:10;background:rgba(12,8,16,.9);border-top:1px solid rgba(244,132,158,.08);padding:32px 48px;text-align:center}
.footer-copy{font-size:11px;color:rgba(255,255,255,.15)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(244,132,158,.25);border-radius:3px}

@media(max-width:768px){
  nav{padding:0 20px}
  .hero{padding:120px 20px 60px}
  .team-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .member-card{padding:24px 14px 20px}
  .avatar-wrap{width:64px;height:64px}
  .avatar-img,.avatar-ph{width:64px;height:64px}
  .avatar-ring{inset:-3px}
  .member-nick{font-size:14px}
}
@media(max-width:400px){
  .team-grid{grid-template-columns:1fr 1fr;gap:10px}
}
</style>
<script>
(function(){try{const c=JSON.parse(localStorage.getItem('mochi_assets')||'{}');if(c.icon){const l=document.createElement('link');l.rel='preload';l.as='image';l.href=c.icon;document.head.appendChild(l);}}catch{}})();
</script>
</head>
<body>

<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grain"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <img id="navIcon" alt="모찌">
    <span class="nav-logo-text">모찌서버</span>
  </a>
  <a href="index.html" class="nav-back">← 메인으로</a>
</nav>

<div class="hero">
  <div class="hero-eyebrow">👥 Our Team</div>
  <h1>모찌서버 <span class="grad">운영팀</span></h1>
  <p class="hero-desc">서버를 함께 만들어가는 운영진을 소개합니다.</p>
</div>

<div class="content" id="teamContent">
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">운영팀 정보를 불러오는 중...</div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2026 모찌서버. All rights reserved.</div>
</footer>

<script type="module">
async function getCfg(){try{const r=await fetch('/api/config');return await r.json();}catch{return null;}}

// 아이콘
(async()=>{
  let cache={};try{cache=JSON.parse(localStorage.getItem('mochi_assets')||'{}');}catch{}
  if(cache.icon){const el=document.getElementById('navIcon');if(el){el.src=cache.icon;el.style.display='';}}
})();

const RANK_META={
  '운영자':{icon:'👑',color:'#ffd700'},
  '관리자':{icon:'⭐',color:'#f4849e'},
  '스태프':{icon:'🛡️',color:'#7dd3fc'},
  '뉴비도우미':{icon:'🌱',color:'#4ade80'},
  '휴가자':{icon:'🌙',color:'#a78bfa'},
};
const RANK_ORDER=['총관리자','운영자','관리자','스태프','인턴스태프','선임 뉴비도우미','뉴비도우미','휴가자'];

function renderTeam(members){
  const wrap=document.getElementById('teamContent');
  if(!members.length){wrap.innerHTML='<div class="empty-state">등록된 운영팀이 없습니다.</div>';return;}

  const groups={};
  members.forEach(m=>{const g=m.rank||'기타';if(!groups[g])groups[g]=[];groups[g].push(m);});
  const sorted=Object.keys(groups).sort((a,b)=>{
    const ai=RANK_ORDER.indexOf(a),bi=RANK_ORDER.indexOf(b);
    return(ai===-1?99:ai)-(bi===-1?99:bi);
  });

  let html='';
  sorted.forEach((rank,gi)=>{
    const meta=RANK_META[rank]||{icon:'📌',color:'#f4849e'};
    const cards=groups[rank];
    html+=`<div class="rank-group" style="animation-delay:${gi*0.1}s">
      <div class="rank-header">
        <div class="rank-icon">${meta.icon}</div>
        <div class="rank-name">${rank}<span class="rank-count">(${cards.length})</span></div>
        <div class="rank-line"></div>
      </div>
      <div class="team-grid">
        ${cards.map((m,ci)=>`
          <div class="member-card" style="animation:revealUp .5s ${(gi*0.1)+(ci*0.06)}s ease both">
            <div class="avatar-wrap">
              <div class="avatar-ring"></div>
              ${m.photo
                ?`<img class="avatar-img" src="${m.photo}" alt="${m.nick}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                :''}
              <div class="avatar-ph" ${m.photo?'style="display:none"':''}>${(m.nick||'?')[0]}</div>
            </div>
            <div class="member-nick">${m.nick||'-'}</div>
            <div class="member-rank">${m.rank||'-'}</div>
            ${m.team?`<div class="member-team">${m.team}</div>`:''}
            ${m.discord?`<div class="member-discord">${m.discord}</div>`:''}
          </div>
        `).join('')}
      </div>
    </div>`;
  });
  wrap.innerHTML=html;
}

async function loadTeam(){
  try{
    const cfg=await getCfg();
    if(!cfg||!cfg.apiKey){document.getElementById('teamContent').innerHTML='<div class="empty-state">설정 오류</div>';return;}
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const{getFirestore,collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    let app;try{app=initializeApp(cfg);}catch{app=initializeApp(cfg,'team');}
    const db=getFirestore(app);
    const sn=await getDocs(collection(db,'team_members'));
    const members=sn.docs.map(d=>({id:d.id,...d.data()}));
    renderTeam(members);
  }catch(e){
    document.getElementById('teamContent').innerHTML=`<div class="empty-state">불러오기 실패: ${e.message}</div>`;
  }
}
loadTeam();
</script>
</body>
</html>
