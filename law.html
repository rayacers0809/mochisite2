<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법률 가이드 — 모찌서버</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-brand:#3b82f6;--c-brand-light:#60a5fa;--c-brand-dark:#2563eb;
  --c-bg:#ffffff;--c-bg-soft:#f6f6f7;--c-bg-mute:#f0f0f1;
  --c-border:#e2e2e3;--c-text-1:rgba(60,60,67,1);--c-text-2:rgba(60,60,67,.78);--c-text-3:rgba(60,60,67,.5);
  --nav-h:64px;--sb-w:272px;
}
[data-theme="dark"]{
  --c-bg:#1b1b1f;--c-bg-soft:#252529;--c-bg-mute:#313136;
  --c-border:rgba(82,82,89,.6);--c-text-1:rgba(255,255,245,.86);--c-text-2:rgba(235,235,245,.6);--c-text-3:rgba(235,235,245,.35);
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--c-bg);color:var(--c-text-1);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}

/* ─ 네비 ─ */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(var(--c-bg-rgb,255,255,255),.9);border-bottom:1px solid var(--c-border);z-index:100;display:flex;align-items:center;padding:0 24px;gap:0;backdrop-filter:blur(8px)}
[data-theme="dark"] .nav{background:rgba(27,27,31,.9)}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:24px;flex-shrink:0}
.nav-logo-txt{font-size:15px;font-weight:700;color:var(--c-text-1)}
.nav-logo-sep{color:var(--c-text-3);margin:0 4px}
.nav-logo-sub{font-size:13px;color:var(--c-text-3)}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{font-size:14px;color:var(--c-text-2);text-decoration:none;padding:5px 10px;border-radius:6px;transition:color .15s,background .15s;font-weight:500;cursor:pointer;border:none;background:none;font-family:inherit}
.nav-link:hover{color:var(--c-brand);background:rgba(59,130,246,.07)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.search-btn{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:8px;border:1px solid var(--c-border);background:var(--c-bg-soft);color:var(--c-text-3);font-size:13px;cursor:pointer;font-family:inherit;transition:border-color .2s;white-space:nowrap}
.search-btn:hover{border-color:var(--c-brand);color:var(--c-text-2)}
.search-btn kbd{font-size:10px;background:var(--c-bg-mute);padding:1px 5px;border-radius:4px;border:1px solid var(--c-border)}
.theme-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--c-border);background:var(--c-bg-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.theme-btn:hover{border-color:var(--c-brand)}
.discord-btn{font-size:13px;font-weight:600;color:var(--c-brand);text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid rgba(59,130,246,.3);background:rgba(59,130,246,.07);transition:all .2s;white-space:nowrap}
.discord-btn:hover{background:rgba(59,130,246,.14)}

/* ─ 레이아웃 ─ */
.layout{display:flex;padding-top:var(--nav-h);min-height:100vh}

/* ─ 사이드바 ─ */
.sb{position:fixed;top:var(--nav-h);bottom:0;left:0;width:var(--sb-w);overflow-y:auto;border-right:1px solid var(--c-border);background:var(--c-bg-soft);z-index:50;padding:16px 0 32px}
.sb::-webkit-scrollbar{width:4px}
.sb::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:2px}
.sb-section{padding:0 12px;margin-bottom:8px}
.sb-label{font-size:12px;font-weight:700;color:var(--c-text-3);letter-spacing:.05em;padding:8px 10px 5px;display:flex;align-items:center;gap:6px}
.sb-list{list-style:none}
.sb-link{display:flex;align-items:center;gap:6px;width:100%;padding:6px 10px;border-radius:7px;font-size:13.5px;color:var(--c-text-2);text-decoration:none;cursor:pointer;transition:all .15s;border:1px solid transparent;font-weight:400;background:none;font-family:inherit;text-align:left}
.sb-link:hover{color:var(--c-brand);background:rgba(59,130,246,.07)}
.sb-link.active{color:var(--c-brand);background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.2);font-weight:600}
.sb-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.sb-divider{height:1px;background:var(--c-border);margin:8px 16px}
.sb-parent-label{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font-size:12px;font-weight:700;color:var(--c-text-3);letter-spacing:.05em;cursor:pointer;border-radius:7px;transition:background .15s;user-select:none;margin:4px 0}
.sb-parent-label:hover{background:rgba(59,130,246,.07);color:var(--c-brand)}
.sb-parent-chev{font-size:11px}
.sb-parent-body{padding-left:8px}
.sb-subgroup{margin-bottom:2px}
.sb-sublabel{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;font-size:12.5px;font-weight:600;color:var(--c-text-2);cursor:pointer;border-radius:6px;transition:background .12s;user-select:none}
.sb-sublabel:hover{background:rgba(59,130,246,.07);color:var(--c-brand)}
.sb-sub-chev{font-size:10px}
.sb-sublist{padding-left:8px}
.sb-link-deep{padding-left:14px;font-size:13px}

/* ─ 콘텐츠 ─ */
.content{flex:1;margin-left:var(--sb-w);padding:48px 64px 80px;max-width:800px;min-width:0}

/* ─ 홈 ─ */
.hero{text-align:center;padding:72px 0 56px;border-bottom:1px solid var(--c-border);margin-bottom:48px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--c-brand);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);padding:4px 14px;border-radius:100px;margin-bottom:20px;font-weight:600}
.hero-title{font-size:42px;font-weight:800;line-height:1.15;letter-spacing:-.04em;margin-bottom:16px;color:var(--c-text-1)}
.hero-title em{font-style:normal;background:linear-gradient(135deg,#3b82f6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-desc{font-size:17px;color:var(--c-text-2);max-width:420px;margin:0 auto 32px;line-height:1.7}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:11px 26px;border-radius:9px;background:var(--c-brand);color:#fff;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:background .2s,transform .15s;box-shadow:0 4px 14px rgba(59,130,246,.3)}
.btn-p:hover{background:var(--c-brand-dark);transform:translateY(-1px)}
.btn-o{display:inline-flex;align-items:center;gap:7px;padding:11px 26px;border-radius:9px;border:1.5px solid var(--c-border);color:var(--c-text-2);font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.btn-o:hover{border-color:var(--c-brand);color:var(--c-brand);background:rgba(59,130,246,.05)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card{background:var(--c-bg-soft);border:1px solid var(--c-border);border-radius:11px;padding:22px;cursor:pointer;transition:all .2s;text-decoration:none;display:block}
.card:hover{border-color:rgba(59,130,246,.45);box-shadow:0 4px 18px rgba(59,130,246,.1);transform:translateY(-2px)}
.card-ico{font-size:26px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:700;color:var(--c-text-1);margin-bottom:5px}
.card-count{font-size:12px;color:var(--c-brand);font-weight:600}

/* ─ 문서 ─ */
.doc-crumb{font-size:12px;color:var(--c-text-3);margin-bottom:14px;display:flex;align-items:center;gap:5px}
.doc-crumb span{cursor:pointer;transition:color .15s}
.doc-crumb span:hover{color:var(--c-brand)}
.doc-crumb span:last-child{color:var(--c-text-2);cursor:default}
.doc-title{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;line-height:1.25}
.doc-meta{font-size:12px;color:var(--c-text-3);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--c-border)}

/* ─ 법률 아이템 ─ */
.law-item{border:1px solid var(--c-border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.law-item:hover{border-color:rgba(59,130,246,.4)}
.law-item.open{border-color:rgba(59,130,246,.4)}
.law-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;background:var(--c-bg);transition:background .15s;user-select:none;gap:12px}
.law-item:hover .law-head,.law-item.open .law-head{background:rgba(59,130,246,.03)}
.law-head-title{font-size:14px;font-weight:600;color:var(--c-text-1);display:flex;align-items:center;gap:7px}
.law-head-title::before{content:'§';font-size:11px;color:var(--c-brand);font-weight:700;flex-shrink:0}
.law-chev{color:var(--c-text-3);font-size:11px;transition:transform .22s;flex-shrink:0}
.law-item.open .law-chev{transform:rotate(180deg)}
.law-body{display:none;border-top:1px solid var(--c-border);background:var(--c-bg-soft)}
.law-item.open .law-body{display:block}
.law-body-inner{padding:18px 22px;font-size:13.5px;line-height:1.95;color:var(--c-text-2)}

/* ─ 마크다운 렌더 ─ */
.md h1{font-size:24px;font-weight:700;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--c-border);color:var(--c-text-1)}
.md h2{font-size:20px;font-weight:700;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--c-border);color:var(--c-text-1)}
.md h3{font-size:17px;font-weight:700;margin:20px 0 8px;color:var(--c-text-1)}
.md h4,.md h5,.md h6{font-size:15px;font-weight:700;margin:16px 0 6px;color:var(--c-text-1)}
.md p{margin:10px 0;font-size:14px;line-height:1.85;color:var(--c-text-2)}
.md ul,.md ol{margin:10px 0 10px 20px;display:flex;flex-direction:column;gap:4px}
.md li{font-size:14px;line-height:1.8;color:var(--c-text-2)}
.md li>ul,.md li>ol{margin:4px 0 4px 18px}
.md strong{color:var(--c-text-1);font-weight:600}
.md em{color:var(--c-text-2);font-style:italic}
.md blockquote{margin:14px 0;padding:10px 16px;border-left:3px solid var(--c-brand);background:rgba(59,130,246,.06);border-radius:0 8px 8px 0;color:var(--c-text-2);font-size:14px;line-height:1.8}
.md blockquote p{margin:0;color:inherit}
.md code{font-family:'SF Mono','Fira Code',monospace;font-size:12.5px;background:var(--c-bg-mute);color:var(--c-brand-light);padding:2px 6px;border-radius:5px;border:1px solid var(--c-border)}
.md pre{background:var(--c-bg-mute);border:1px solid var(--c-border);border-radius:10px;padding:16px 20px;margin:14px 0;overflow-x:auto}
.md pre code{background:none;border:none;padding:0;color:var(--c-text-2);font-size:13px;line-height:1.7}
.md table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
.md th{text-align:left;padding:9px 14px;background:var(--c-bg-mute);border:1px solid var(--c-border);font-weight:700;color:var(--c-text-1)}
.md td{padding:9px 14px;border:1px solid var(--c-border);color:var(--c-text-2);line-height:1.7}
.md tr:hover td{background:rgba(59,130,246,.03)}
.md a{color:var(--c-brand);text-decoration:none}
.md a:hover{text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--c-border);margin:24px 0}
.md img{max-width:100%;border-radius:8px;margin:8px 0}

/* ─ 콜아웃 ─ */
.callout{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:14px 18px;margin:14px 0;border-left:4px solid}
.callout-warning{background:rgba(251,146,60,.08);border-color:#fb923c}
.callout-info{background:rgba(56,189,248,.08);border-color:#38bdf8}
.callout-tip{background:rgba(74,222,128,.08);border-color:#4ade80}
.callout-danger{background:rgba(248,113,113,.08);border-color:#f87171}
.callout-icon{font-size:18px;flex-shrink:0;padding-top:1px}
.callout .md{flex:1}
.callout .md p:first-child{margin-top:0}
.callout .md p:last-child{margin-bottom:0}
.callout .md ul,.callout .md ol{margin-top:6px}

/* ─ 단일 문서 내용 ─ */
.law-doc-content{font-size:14px;line-height:1.95;color:var(--c-text-2)}

/* ─ 페이저 ─ */
.pager{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:48px;padding-top:24px;border-top:1px solid var(--c-border)}
.pager-btn{padding:14px 18px;border:1px solid var(--c-border);border-radius:10px;cursor:pointer;text-decoration:none;transition:all .2s;background:var(--c-bg);display:block;color:inherit}
.pager-btn:hover{border-color:var(--c-brand);background:rgba(59,130,246,.04)}
.pager-btn.prev{text-align:left}.pager-btn.next{text-align:right}
.pager-lbl{font-size:11px;color:var(--c-text-3);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.pager-name{font-size:14px;font-weight:600;color:var(--c-brand)}

/* ─ 검색 모달 ─ */
.modal-ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding-top:72px}
.modal-ov.open{display:flex}
.modal-box{background:var(--c-bg);border:1px solid var(--c-border);border-radius:14px;width:100%;max-width:520px;box-shadow:0 16px 60px rgba(0,0,0,.25);overflow:hidden;animation:mfade .15s ease}
@keyframes mfade{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.modal-inp{width:100%;padding:16px 18px;font-size:15px;border:none;border-bottom:1px solid var(--c-border);background:transparent;color:var(--c-text-1);font-family:inherit;outline:none}
.modal-inp::placeholder{color:var(--c-text-3)}
.modal-res{max-height:380px;overflow-y:auto;padding:6px}
.res-item{padding:10px 12px;border-radius:7px;cursor:pointer;transition:background .12s}
.res-item:hover,.res-item.on{background:rgba(59,130,246,.08)}
.res-cat{font-size:11px;color:var(--c-brand);font-weight:600;margin-bottom:2px}
.res-title{font-size:14px;font-weight:600;color:var(--c-text-1)}
.res-prev{font-size:12px;color:var(--c-text-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-empty{text-align:center;padding:28px;color:var(--c-text-3);font-size:13px}
.modal-foot{padding:8px 12px;border-top:1px solid var(--c-border);display:flex;gap:12px;font-size:11px;color:var(--c-text-3)}
.modal-foot kbd{background:var(--c-bg-mute);padding:1px 5px;border-radius:4px;border:1px solid var(--c-border)}

/* ─ 로딩/빈 ─ */
.loading{text-align:center;padding:80px;color:var(--c-text-3);font-size:14px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(59,130,246,.2);border-top-color:var(--c-brand);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
mark{background:rgba(59,130,246,.18);color:var(--c-brand-light);border-radius:3px;padding:0 2px}

/* ─ 반응형 ─ */
@media(max-width:960px){
  .sb{display:none}
  .content{margin-left:0;padding:32px 24px 60px;max-width:100%}
  .hero-title{font-size:30px}
}
@media(max-width:640px){
  .nav{padding:0 14px}
  .nav-links,.discord-btn{display:none}
  .content{padding:20px 16px 48px}
  .pager{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 검색 모달 -->
<div class="modal-ov" id="searchModal" onclick="closeSearchOut(event)">
  <div class="modal-box">
    <input class="modal-inp" id="searchInp" placeholder="법률 검색..." oninput="doSearch(this.value)" onkeydown="searchKey(event)">
    <div class="modal-res" id="searchRes"><div class="res-empty">검색어를 입력하세요</div></div>
    <div class="modal-foot">
      <span><kbd>↑</kbd><kbd>↓</kbd> 이동</span>
      <span><kbd>Enter</kbd> 선택</span>
      <span><kbd>Esc</kbd> 닫기</span>
    </div>
  </div>
</div>

<!-- 네비 -->
<nav class="nav">
  <a class="nav-logo" href="#" onclick="showHome()">
    <span style="font-size:22px">🫧</span>
    <span class="nav-logo-txt">모찌서버</span>
    <span class="nav-logo-sep">/</span>
    <span class="nav-logo-sub">법률 가이드</span>
  </a>
  <div class="nav-links">
    <button class="nav-link" onclick="showHome()">홈</button>
    <button class="nav-link" onclick="showFirstLaw()">법률 가이드</button>
    <a class="nav-link" href="https://discord.gg/mochi-rp" target="_blank">공식 디스코드</a>
  </div>
  <div class="nav-r">
    <button class="search-btn" onclick="openSearch()">🔍 검색 <kbd>K</kbd></button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    <a class="discord-btn" href="https://discord.gg/mochi-rp" target="_blank">Discord →</a>
  </div>
</nav>

<!-- 레이아웃 -->
<div class="layout">
  <aside class="sb" id="sidebar">
    <div style="padding:12px 12px 14px;border-bottom:1px solid var(--c-border);margin-bottom:8px">
      <button class="search-btn" style="width:100%;justify-content:flex-start" onclick="openSearch()">🔍 &nbsp;검색... <kbd style="margin-left:auto">K</kbd></button>
    </div>
    <div id="sbContent"><div style="padding:20px;text-align:center;color:var(--c-text-3);font-size:13px"><span class="spin"></span>불러오는 중...</div></div>
  </aside>
  <main class="content" id="main">
    <div class="loading"><span class="spin"></span>법률 데이터를 불러오는 중...</div>
  </main>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,getDocs,getDoc,doc,orderBy,query}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let db,allLaws=[],catMap={},catList=[];

const ICONS={'기초 법률':'📋','팩션 법률':'🏢','서버 제재 법률':'🚫','헌·형법':'⚖️','범죄 처벌':'🔒','RP 법률 공통':'📜','통합 RP 법률':'🎯','도주 RP':'🚗','즉흥 RP':'⚡','수배 RP':'🔍','영장 RP':'📄','납치·청부의뢰 RP':'🤝','빈집 털이 RP':'🏠','ATM 털이 RP':'💳','편의점 털이 RP':'🏪','남부은행 RP':'🏦','북부은행 RP':'🏦','보석상 털이 RP':'💎','닭공장 털이 RP':'🐔','건샵 털이 RP':'🔫','조직 RP 법률':'⚔️','지상 B':'🔫','지상 C':'🔫','사유지 게릴라':'🌲','카지노 게릴라':'🎰','남부공항 게릴라':'✈️','기업 RP':'💼','발전소점령전':'⚡'};

async function init(){
  try{
    const r=await fetch('/api/config');
    const cfg=await r.json();
    const app=initializeApp(cfg);
    db=getFirestore(app);
    await load();
  }catch(e){
    document.getElementById('main').innerHTML=`<div style="text-align:center;padding:80px;color:var(--c-text-3)">⚠️ 데이터 로드 실패<br><small>${e.message}</small></div>`;
  }
}

async function load(){
  const[sn,catOrdDoc]=await Promise.all([
    getDocs(query(collection(db,'laws'),orderBy('order','asc'))),
    getDoc(doc(db,'settings','law_cat_order'))
  ]);
  allLaws=sn.docs.map(d=>({id:d.id,...d.data()}));
  window.__catOrd=catOrdDoc.exists()?catOrdDoc.data():{parents:[],subs:{}};
  catMap={};
  allLaws.forEach(l=>{const c=l.category||'미분류';if(!catMap[c])catMap[c]=[];catMap[c].push(l);});
  catList=Object.keys(catMap);
  buildSidebar();
  showHome();
}

function buildSidebar(){
  const catOrd=window.__catOrd||{parents:[],subs:{}};

  const tree={};
  allLaws.forEach(l=>{
    const p=l.parent_category||'__root__';
    const c=l.category||'미분류';
    if(!tree[p])tree[p]={order:l.order,cats:{}};
    if(!tree[p].cats[c])tree[p].cats[c]={order:l.order,items:[]};
    tree[p].cats[c].items.push(l);
  });

  // 부모 카테고리 정렬
  const sortParents=(keys)=>keys.sort((a,b)=>{
    const realA=a==='__root__'?'':a, realB=b==='__root__'?'':b;
    const ai=catOrd.parents.indexOf(realA), bi=catOrd.parents.indexOf(realB);
    if(ai>=0&&bi>=0)return ai-bi;
    if(ai>=0)return-1;
    if(bi>=0)return 1;
    return 0;
  });

  // 하위 카테고리 정렬
  const sortSubs=(parent,keys)=>{
    const realParent=parent==='__root__'?'':parent;
    const subOrd=(catOrd.subs||{})[realParent]||[];
    return keys.sort((a,b)=>{
      const ai=subOrd.indexOf(a),bi=subOrd.indexOf(b);
      if(ai>=0&&bi>=0)return ai-bi;
      if(ai>=0)return-1;
      if(bi>=0)return 1;
      return 0;
    });
  };

  let html='';
  sortParents(Object.keys(tree)).forEach(parent=>{
    const sortedCats=sortSubs(parent,Object.keys(tree[parent].cats));
    if(parent==='__root__'){
      sortedCats.forEach(cat=>{
        html+=`<div class="sb-section">
          <div class="sb-label">${ICONS[cat]||'📄'} ${esc(cat)}</div>
          <ul class="sb-list">${tree[parent].cats[cat].items.map(l=>`<li><button class="sb-link" id="sl-${l.id}" onclick="showLaw('${esc(cat)}','${l.id}','')">${esc(l.title||'')}</button></li>`).join('')}</ul>
        </div><div class="sb-divider"></div>`;
      });
    } else {
      const parentId='pg-'+parent.replace(/[^a-zA-Z0-9가-힣]/g,'_');
      html+=`<div class="sb-section">
        <div class="sb-parent-label" onclick="toggleParent('${parentId}')">
          <span>${ICONS[parent]||'📁'} ${esc(parent)}</span>
          <span class="sb-parent-chev" id="pc-${parentId}">▾</span>
        </div>
        <div class="sb-parent-body" id="${parentId}">
          ${sortedCats.map(cat=>`
            <div class="sb-subgroup">
              <div class="sb-sublabel" onclick="toggleSub('sub-${parentId}-${cat.replace(/[^a-zA-Z0-9가-힣]/g,'_')}')">
                <span>${esc(cat)}</span>
                <span class="sb-sub-chev">▾</span>
              </div>
              <ul class="sb-list sb-sublist" id="sub-${parentId}-${cat.replace(/[^a-zA-Z0-9가-힣]/g,'_')}">
                ${tree[parent].cats[cat].items.map(l=>`<li><button class="sb-link sb-link-deep" id="sl-${l.id}" onclick="showLaw('${esc(cat)}','${l.id}','${esc(parent)}')">${esc(l.title||'')}</button></li>`).join('')}
              </ul>
            </div>`).join('')}
        </div>
      </div><div class="sb-divider"></div>`;
    }
  });
  document.getElementById('sbContent').innerHTML=html||'<div style="padding:20px;text-align:center;color:var(--c-text-3);font-size:13px">등록된 법률이 없습니다</div>';
}

window.showHome=()=>{
  setActive(null);
  const total=allLaws.length;
  const upd=allLaws.reduce((m,l)=>{const t=l.updatedAt?.seconds||0;return t>m?t:m;},0);
  const parents=[...new Set(allLaws.map(l=>l.parent_category||l.category||'미분류'))];
  const cardCounts={};allLaws.forEach(l=>{const k=l.parent_category||l.category||'미분류';cardCounts[k]=(cardCounts[k]||0)+1;});
  document.getElementById('main').innerHTML=`
    <div class="hero">
      <div class="hero-badge">⚖️ Official Law Guide</div>
      <h1 class="hero-title">모찌서버<br><em>법률 가이드</em></h1>
      <p class="hero-desc">서버의 모든 법률과 규정을 한눈에 확인하세요.<br>총 ${total}개 법률 수록.</p>
      ${upd?`<p style="font-size:12px;color:var(--c-text-3);margin-bottom:24px">마지막 업데이트: ${new Date(upd*1000).toLocaleDateString('ko-KR')}</p>`:''}
      <div class="hero-btns">
        <button class="btn-p" onclick="showFirstLaw()">📖 법률 가이드 보기</button>
        <a class="btn-o" href="https://discord.gg/mochi-rp" target="_blank">💬 디스코드 참여</a>
      </div>
    </div>
    <div class="cards">${parents.map(p=>`
      <a class="card" onclick="showParent('${esc(p)}')">
        <div class="card-ico">${ICONS[p]||'📄'}</div>
        <div class="card-title">${esc(p)}</div>
        <div class="card-count">${cardCounts[p]||0}개 법률</div>
      </a>`).join('')}
    </div>`;
};

window.showParent=(parent)=>{
  const laws=allLaws.filter(l=>(l.parent_category||l.category||'')===parent);
  if(!laws.length)return;setActive(null);
  const cats={};laws.forEach(l=>{const c=l.category||'미분류';if(!cats[c])cats[c]=[];cats[c].push(l);});
  const parents=[...new Set(allLaws.map(l=>l.parent_category||l.category||'미분류'))];
  const idx=parents.indexOf(parent);
  const prev=idx>0?parents[idx-1]:null;const next=idx<parents.length-1?parents[idx+1]:null;
  document.getElementById('main').innerHTML=`
    <div class="doc-crumb"><span onclick="showHome()">홈</span><span>›</span><span>${esc(parent)}</span></div>
    <h1 class="doc-title">${ICONS[parent]||'📁'} ${esc(parent)}</h1>
    <div class="doc-meta">${laws.length}개 항목</div>
    ${Object.entries(cats).map(([cat,items])=>`
      <div style="margin-bottom:28px">
        <div style="font-size:16px;font-weight:700;color:var(--c-text-1);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--c-border)">${esc(cat)}</div>
        ${items.map(l=>`<div class="law-item" id="li-${l.id}"><div class="law-head" onclick="toggleItem('${l.id}')"><div class="law-head-title">${esc(l.title||'')}</div><div class="law-chev">▼</div></div><div class="law-body"><div class="law-body-inner">${renderContent(l)}</div></div></div>`).join('')}
      </div>`).join('')}
    <div class="pager">
      <div>${prev?`<a class="pager-btn prev" onclick="showParent('${esc(prev)}')"><div class="pager-lbl">← 이전</div><div class="pager-name">${esc(prev)}</div></a>`:''}</div>
      <div>${next?`<a class="pager-btn next" onclick="showParent('${esc(next)}')"><div class="pager-lbl">다음 →</div><div class="pager-name">${esc(next)}</div></a>`:''}</div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
};

window.showCat=(cat,parent='')=>{
  if(!catMap[cat])return;setActive(null);
  const items=catMap[cat];
  document.getElementById('main').innerHTML=`
    <div class="doc-crumb"><span onclick="showHome()">홈</span><span>›</span>${parent?`<span onclick="showParent('${esc(parent)}')">${esc(parent)}</span><span>›</span>`:''}<span>${esc(cat)}</span></div>
    <h1 class="doc-title">${ICONS[cat]||'📄'} ${esc(cat)}</h1>
    <div class="doc-meta">${items.length}개 항목</div>
    ${items.map(l=>`<div class="law-item" id="li-${l.id}"><div class="law-head" onclick="toggleItem('${l.id}')"><div class="law-head-title">${esc(l.title||'')}</div><div class="law-chev">▼</div></div><div class="law-body"><div class="law-body-inner">${renderContent(l)}</div></div></div>`).join('')}`;
  window.scrollTo({top:0,behavior:'smooth'});
};

window.showLaw=(cat,id,parent='')=>{
  const l=allLaws.find(x=>x.id===id);if(!l)return;
  setActive(id);
  const items=catMap[cat]||[];
  const idx=items.findIndex(x=>x.id===id);
  const prev=idx>0?items[idx-1]:null;const next=idx<items.length-1?items[idx+1]:null;
  document.getElementById('main').innerHTML=`
    <div class="doc-crumb"><span onclick="showHome()">홈</span><span>›</span>${parent?`<span onclick="showParent('${esc(parent)}')">${esc(parent)}</span><span>›</span>`:''}<span onclick="showCat('${esc(cat)}','${esc(parent)}')">${esc(cat)}</span><span>›</span><span>${esc(l.title||'')}</span></div>
    <h1 class="doc-title">${esc(l.title||'')}</h1>
    <div class="doc-meta">${l.updatedAt?.seconds?`🕐 업데이트: ${new Date(l.updatedAt.seconds*1000).toLocaleDateString('ko-KR')}`:'&nbsp;'}</div>
    <div class="law-doc-content">${renderContent(l)}</div>
    <div class="pager">
      <div>${prev?`<a class="pager-btn prev" onclick="showLaw('${esc(cat)}','${prev.id}','${esc(parent)}')"><div class="pager-lbl">← 이전</div><div class="pager-name">${esc(prev.title||'')}</div></a>`:''}</div>
      <div>${next?`<a class="pager-btn next" onclick="showLaw('${esc(cat)}','${next.id}','${esc(parent)}')"><div class="pager-lbl">다음 →</div><div class="pager-name">${esc(next.title||'')}</div></a>`:''}</div>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
};

window.showFirstLaw=()=>{const p=[...new Set(allLaws.map(l=>l.parent_category||l.category||'미분류'))];if(p.length)showParent(p[0]);};
window.toggleItem=(id)=>{const el=document.getElementById('li-'+id);if(el)el.classList.toggle('open');};
window.toggleParent=(id)=>{const b=document.getElementById(id);const c=document.getElementById('pc-'+id);if(!b)return;const o=b.style.display!=='none';b.style.display=o?'none':'';if(c)c.textContent=o?'▸':'▾';};
window.toggleSub=(id)=>{const b=document.getElementById(id);if(!b)return;const o=b.style.display!=='none';b.style.display=o?'none':'';const c=b.previousElementSibling?.querySelector('.sb-sub-chev');if(c)c.textContent=o?'▸':'▾';};
function setActive(id){document.querySelectorAll('.sb-link').forEach(a=>a.classList.remove('active'));if(id){const el=document.getElementById('sl-'+id);if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}}}

// ── 검색 ──
let si=-1;
window.openSearch=()=>{document.getElementById('searchModal').classList.add('open');setTimeout(()=>document.getElementById('searchInp').focus(),40);};
window.closeSearchOut=(e)=>{if(e.target.id==='searchModal')closeSearch();};
function closeSearch(){document.getElementById('searchModal').classList.remove('open');document.getElementById('searchInp').value='';document.getElementById('searchRes').innerHTML='<div class="res-empty">검색어를 입력하세요</div>';si=-1;}
window.doSearch=(q)=>{
  si=-1;
  if(!q.trim()){document.getElementById('searchRes').innerHTML='<div class="res-empty">검색어를 입력하세요</div>';return;}
  const res=allLaws.filter(l=>(l.title||'').toLowerCase().includes(q.toLowerCase())||(l.content||'').toLowerCase().includes(q.toLowerCase())||(l.category||'').toLowerCase().includes(q.toLowerCase())||(l.parent_category||'').toLowerCase().includes(q.toLowerCase())).slice(0,20);
  if(!res.length){document.getElementById('searchRes').innerHTML='<div class="res-empty">검색 결과가 없습니다</div>';return;}
  document.getElementById('searchRes').innerHTML=res.map(l=>`
    <div class="res-item" data-cat="${esc(l.category||'')}" data-id="${l.id}" data-parent="${esc(l.parent_category||'')}" onclick="pickResult('${esc(l.category||'')}','${l.id}','${esc(l.parent_category||'')}')">
      <div class="res-cat">${l.parent_category?esc(l.parent_category)+' › ':''} ${esc(l.category||'미분류')}</div>
      <div class="res-title">${hl(esc(l.title||''),q)}</div>
      <div class="res-prev">${hl(esc((l.content||'').replace(/\n/g,' ').substring(0,80)),q)}</div>
    </div>`).join('');
};
window.pickResult=(cat,id,parent)=>{closeSearch();showLaw(cat,id,parent||'');};
window.searchKey=(e)=>{
  const items=document.querySelectorAll('.res-item');
  if(e.key==='Escape'){closeSearch();return;}
  if(e.key==='ArrowDown')si=Math.min(si+1,items.length-1);
  else if(e.key==='ArrowUp')si=Math.max(si-1,0);
  else if(e.key==='Enter'){if(si>=0&&items[si]){const el=items[si];pickResult(el.dataset.cat,el.dataset.id,el.dataset.parent);}return;}
  items.forEach((el,i)=>el.classList.toggle('on',i===si));
  if(items[si])items[si].scrollIntoView({block:'nearest'});
};
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();}if(e.key==='Escape')closeSearch();});

// ── 테마 ──
window.toggleTheme=()=>{const d=document.documentElement.dataset.theme==='dark';document.documentElement.dataset.theme=d?'light':'dark';document.getElementById('themeBtn').textContent=d?'🌙':'☀️';localStorage.setItem('vp-t',d?'light':'dark');};
const st=localStorage.getItem('vp-t');if(st){document.documentElement.dataset.theme=st;document.getElementById('themeBtn').textContent=st==='dark'?'🌙':'☀️';}

// ── 유틸 ──
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function md(t){
  if(!t)return'';
  if(typeof marked==='undefined')return`<div style="white-space:pre-wrap">${esc(t)}</div>`;
  marked.setOptions({breaks:true,gfm:true});
  return marked.parse(String(t));
}
function hl(t,q){if(!q)return t;const r=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return t.replace(new RegExp(`(${r})`,'gi'),'<mark>$1</mark>');}

// ── 블록 렌더러 ──
const CALLOUT_TYPES={warning:{cls:'callout-warning',ico:'⚠️'},info:{cls:'callout-info',ico:'ℹ️'},tip:{cls:'callout-tip',ico:'✅'},danger:{cls:'callout-danger',ico:'❌'}};
function renderContent(law){
  if(law.blocks&&law.blocks.length){
    return law.blocks.map(b=>{
      if(b.type==='text') return`<div class="md">${md(b.text||'')}</div>`;
      if(b.type==='image') return`<figure style="margin:16px 0"><img src="${esc(b.url||'')}" style="max-width:100%;border-radius:8px;border:1px solid var(--c-border)"></figure>`;
      if(b.type==='callout'){const ct=CALLOUT_TYPES[b.callout_type||'warning']||CALLOUT_TYPES.warning;return`<div class="callout ${ct.cls}"><span class="callout-icon">${ct.ico}</span><div class="md">${md(b.text||'')}</div></div>`;}
      return'';
    }).join('');
  }
  // 구버전 호환
  return`<div class="md">${md(law.content||'')}</div>`;
}

init();
</script>
