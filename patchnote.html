<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소식 | 모찌서버</title>
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.mochi.me.kr/patchnote">
<meta property="og:title" content="소식 | 모찌서버">
<meta property="og:description" content="모찌서버의 최신 업데이트 내역을 확인하세요.">
<meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/mochi-f81d3.firebasestorage.app/o/site%2Ficon.png?alt=media">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#f4849e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#f4849e;--pd:#e8607e;--peach:#f9a87a;
  --bg:#0e0c0f;--bg2:#161318;--card:#1c181f;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:rgba(255,255,255,.9);--mu:rgba(255,255,255,.45);--mu2:rgba(255,255,255,.65);
  --grad:linear-gradient(135deg,var(--pd),var(--peach));
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-weight:400;overflow-x:hidden;min-height:100vh}

/* 배경 */
#bgWrap{position:fixed;inset:0;z-index:0}
#bgVideo,#bgImage{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;opacity:0;transition:opacity 1.2s ease}
#bgVideo.loaded,#bgImage.loaded{opacity:.6}
#bgOverlay{position:absolute;inset:0;background:rgba(14,12,15,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* 네비 */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:64px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 40px;background:rgba(14,12,15,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-logo img{width:34px;height:34px;border-radius:9px;object-fit:cover;display:none}
.nav-logo-text{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;justify-content:center}
.nav-links a{font-size:13.5px;font-weight:500;color:var(--mu2);text-decoration:none;padding:7px 14px;border-radius:8px;transition:color .15s,background .15s}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.07)}
.nav-r{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.nav-discord{display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:100px;background:rgba(88,101,242,.2);border:1px solid rgba(88,101,242,.4);color:#7289da;font-size:13px;font-weight:700;text-decoration:none;transition:all .2s}
.nav-discord:hover{background:rgba(88,101,242,.3)}
.nav-start{padding:8px 20px;border-radius:100px;background:var(--grad);color:#fff;font-size:13px;font-weight:700;text-decoration:none;box-shadow:0 4px 16px rgba(244,132,158,.35);transition:opacity .2s,transform .15s}
.nav-start:hover{opacity:.88;transform:translateY(-1px)}

/* 페이지 공통 */
.page{position:relative;z-index:10}
.container{max-width:1100px;margin:0 auto;padding:0 40px}

/* ── 리스트 뷰 ── */
#listView{}

/* 피처드 히어로 */
.featured{padding-top:96px;padding-bottom:60px;border-bottom:1px solid var(--border)}
.featured-inner{max-width:1100px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:1fr 380px;gap:60px;align-items:center}
.featured-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:rgba(56,189,248,.15);color:#38bdf8;letter-spacing:.05em;margin-bottom:14px}
.featured-date{font-size:12px;color:var(--mu);margin-bottom:10px}
.featured-title{font-family:'Nunito',sans-serif;font-size:clamp(24px,3.5vw,40px);font-weight:900;line-height:1.2;color:#fff;margin-bottom:14px;letter-spacing:-.02em}
.featured-desc{font-size:14px;color:var(--mu2);line-height:1.75;margin-bottom:28px}
.featured-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:100px;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer;background:none;font-family:inherit;transition:all .2s}
.featured-btn:hover{border-color:rgba(244,132,158,.5);color:#fff;background:rgba(244,132,158,.08)}
.featured-thumb{border-radius:16px;overflow:hidden;border:1px solid var(--border2);background:var(--card);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
.featured-thumb img{width:100%;height:100%;object-fit:cover}
.featured-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(244,132,158,.12),rgba(249,168,122,.07));font-size:52px;opacity:.35}

/* 필터 + 검색 */
.filter-bar{max-width:1100px;margin:0 auto;padding:32px 40px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:6px}
.filter-tab{padding:7px 18px;border-radius:100px;font-size:13px;font-weight:600;border:1.5px solid var(--border);color:var(--mu2);background:none;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-tab:hover{border-color:var(--border2);color:#fff}
.filter-tab.active{background:rgba(244,132,158,.12);border-color:rgba(244,132,158,.4);color:var(--pink)}
.filter-search{position:relative}
.filter-search input{padding:8px 14px 8px 36px;border-radius:100px;border:1.5px solid var(--border);background:rgba(255,255,255,.05);color:#fff;font-size:13px;font-family:inherit;outline:none;width:220px;transition:border-color .2s}
.filter-search input:focus{border-color:rgba(244,132,158,.4)}
.filter-search input::placeholder{color:var(--mu)}
.filter-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:13px;pointer-events:none}

/* 그리드 */
.grid-wrap{max-width:1100px;margin:0 auto;padding:0 40px 60px}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s}
.news-card:hover{border-color:rgba(244,132,158,.35);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.nc-thumb{aspect-ratio:16/9;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center}
.nc-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.news-card:hover .nc-thumb img{transform:scale(1.04)}
.nc-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(244,132,158,.1),rgba(249,168,122,.07));font-size:32px;opacity:.4}
.nc-body{padding:16px 18px 18px}
.nc-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nc-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.04em}
.nc-tag.t-patch{background:rgba(56,189,248,.15);color:#38bdf8}
.nc-tag.t-notice{background:rgba(167,139,250,.15);color:#a78bfa}
.nc-tag.t-new{background:rgba(74,222,128,.15);color:#4ade80}
.nc-tag.t-fix{background:rgba(251,146,60,.15);color:#fb923c}
.nc-tag.t-change{background:rgba(244,132,158,.15);color:var(--pink)}
.nc-date{font-size:11px;color:var(--mu)}
.nc-title{font-size:15px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:6px}
.nc-desc{font-size:12.5px;color:var(--mu);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* 페이지네이션 */
.pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:0 40px 80px}
.page-btn{padding:8px 22px;border-radius:100px;border:1.5px solid var(--border);color:var(--mu2);background:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.page-btn:hover:not(:disabled){border-color:rgba(244,132,158,.4);color:var(--pink)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:13px;color:var(--mu);font-weight:600;min-width:60px;text-align:center}

/* ── 디테일 뷰 ── */
#detailView{display:none;padding-top:80px}
.detail-back{max-width:800px;margin:0 auto;padding:24px 40px 0;display:flex;align-items:center;gap:8px;color:var(--mu2);font-size:13px;font-weight:600;cursor:pointer;transition:color .15s;width:fit-content}
.detail-back:hover{color:#fff}
.detail-back svg{transition:transform .15s}
.detail-back:hover svg{transform:translateX(-3px)}
.detail-thumb{max-width:800px;margin:20px auto 0;padding:0 40px}
.detail-thumb img{width:100%;border-radius:16px;object-fit:cover;border:1px solid var(--border);max-height:400px}
.detail-thumb-ph{width:100%;aspect-ratio:16/9;border-radius:16px;background:linear-gradient(135deg,rgba(244,132,158,.12),rgba(249,168,122,.07));display:flex;align-items:center;justify-content:center;font-size:60px;opacity:.3;border:1px solid var(--border)}
.detail-body{max-width:800px;margin:0 auto;padding:28px 40px 80px}
.detail-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.detail-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px}
.detail-date{font-size:12px;color:var(--mu)}
.detail-title{font-family:'Nunito',sans-serif;font-size:clamp(24px,4vw,38px);font-weight:900;line-height:1.2;color:#fff;margin-bottom:8px;letter-spacing:-.02em}
.detail-ver{font-size:13px;color:var(--mu);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
/* 마크다운 콘텐츠 */
.detail-content h1,.detail-content h2,.detail-content h3{font-family:'Nunito',sans-serif;font-weight:800;color:#fff;margin:28px 0 12px;line-height:1.3}
.detail-content h2{font-size:20px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-content h3{font-size:17px}
.detail-content p{font-size:14px;line-height:1.9;color:var(--mu2);margin:10px 0}
.detail-content ul,.detail-content ol{margin:10px 0 10px 20px;display:flex;flex-direction:column;gap:5px}
.detail-content li{font-size:14px;line-height:1.8;color:var(--mu2)}
.detail-content li>ul{margin:4px 0 4px 16px}
.detail-content strong{color:#fff;font-weight:600}
.detail-content blockquote{margin:14px 0;padding:10px 18px;border-left:3px solid var(--pink);background:rgba(244,132,158,.07);border-radius:0 8px 8px 0;font-size:13.5px;color:var(--mu2);line-height:1.8}
.detail-content blockquote p{margin:0}
.detail-content img{max-width:100%;border-radius:10px;border:1px solid var(--border);margin:16px 0;cursor:zoom-in}
.detail-content table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13.5px}
.detail-content th{text-align:left;padding:9px 14px;background:rgba(255,255,255,.06);border:1px solid var(--border);font-weight:700;color:#fff}
.detail-content td{padding:9px 14px;border:1px solid var(--border);color:var(--mu2);line-height:1.7}
.detail-content hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.detail-content .callout{display:flex;align-items:flex-start;gap:10px;border-radius:8px;padding:12px 16px;margin:14px 0;border-left:4px solid}
.detail-content .callout-warning{background:rgba(251,146,60,.08);border-color:#fb923c}
.detail-content .callout-info{background:rgba(56,189,248,.08);border-color:#38bdf8}
.detail-content .callout-tip{background:rgba(74,222,128,.08);border-color:#4ade80}
.detail-content .callout-danger{background:rgba(248,113,113,.08);border-color:#f87171}
/* 이전 패치노트 버튼 */
.detail-nav{margin-top:40px;padding-top:28px;border-top:1px solid var(--border)}
.detail-prev-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:1px solid var(--border);color:var(--mu2);font-size:13px;cursor:pointer;background:none;font-family:inherit;transition:all .15s}
.detail-prev-btn:hover{border-color:rgba(244,132,158,.4);color:var(--pink)}

/* 로딩 */
.loading-state{text-align:center;padding:80px;color:var(--mu);font-size:14px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(244,132,158,.2);border-top-color:var(--pink);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}

/* 라이트박스 */
.lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:fixed;top:16px;right:20px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* 빈 상태 */
.empty-state{text-align:center;padding:80px 20px;color:var(--mu)}
.empty-state-ico{font-size:40px;margin-bottom:14px}

/* 푸터 */
footer{position:relative;z-index:10;background:rgba(8,6,9,.9);border-top:1px solid var(--border);padding:36px 40px;text-align:center}
.footer-biz{font-size:11px;color:rgba(255,255,255,.2);line-height:1.9;margin-bottom:10px}
.footer-biz span{margin:0 6px}
.footer-copy{font-size:11px;color:rgba(255,255,255,.2)}

/* 반응형 */
/* ── 모바일 드로어 ── */
.mob-menu-btn{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;color:var(--text);font-size:18px;flex-shrink:0}
.mob-nav-drawer{display:none;position:fixed;top:64px;left:0;right:0;z-index:99;background:rgba(14,12,15,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;flex-direction:column;gap:4px;animation:slideDown .2s ease}
.mob-nav-drawer.open{display:flex}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mob-nav-link{display:block;padding:12px 16px;border-radius:10px;color:var(--mu2);text-decoration:none;font-size:14px;font-weight:500;transition:all .15s}
.mob-nav-link:hover{background:rgba(244,132,158,.08);color:var(--pink)}
.mob-nav-divider{height:1px;background:var(--border);margin:6px 0}
.mob-nav-actions{display:flex;gap:8px;padding:8px 0 4px}
.mob-nav-actions a{flex:1;text-align:center;padding:12px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none}

@media(max-width:900px){
  .news-grid{grid-template-columns:1fr 1fr}
  .featured-inner{grid-template-columns:1fr;gap:24px}
  .featured-thumb{order:-1;aspect-ratio:16/7}
}
@media(max-width:640px){
  nav{padding:0 16px}
  .nav-links,.nav-discord{display:none}
  .nav-start{padding:7px 14px;font-size:12px}
  .mob-menu-btn{display:flex}
  .featured-inner{padding:0 16px}
  .featured{padding-top:80px;padding-bottom:40px}
  .featured-title{font-size:22px}
  .featured-desc{font-size:13px}
  .filter-bar{padding:20px 16px 12px;gap:10px}
  .filter-tabs{flex-wrap:wrap;gap:6px}
  .filter-tab{padding:6px 14px;font-size:12px}
  .filter-search{width:100%}
  .filter-search input{width:100%}
  .grid-wrap{padding:0 16px 40px}
  .news-grid{grid-template-columns:1fr}
  .pagination{padding:0 16px 48px;gap:10px}
  .detail-back{padding:20px 16px 0}
  .detail-thumb{padding:16px 16px 0}
  .detail-body{padding:20px 16px 60px}
  .detail-title{font-size:22px}
  .detail-content h2{font-size:17px}
  footer{padding:24px 16px}
}

/* ── 패치노트 모달 ── */
.patch-modal-ov{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.patch-modal-ov.open{opacity:1;pointer-events:all}
.patch-modal-box{
  position:relative;
  background:rgba(28,22,35,.97);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  width:90%;max-width:600px;max-height:85vh;
  overflow:hidden;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.pm-close-btn{
  position:absolute;top:16px;right:16px;z-index:10;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.4);border:none;
  color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.pm-close-btn:hover{background:rgba(255,255,255,.15)}
.pm-body{padding:24px 28px 28px}
.pm-meta-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pm-tag{font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600}
.pm-date-txt{font-size:12px;color:var(--mu)}
.pm-title-txt{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.pm-ver-txt{font-size:13px;color:var(--mu);margin-bottom:20px}
.pm-md{color:var(--mu2);font-size:14px;line-height:1.7}
.pm-md h2,.pm-md h3{color:#fff;margin:20px 0 10px;font-size:16px}
.pm-md p{margin:8px 0}
.pm-md ul,.pm-md ol{padding-left:20px;margin:8px 0}
.pm-md img{max-width:100%;border-radius:10px;margin:12px 0}
.pm-footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08)}

/* ── 페이지 전환 ── */
#pageTransition{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity .45s cubic-bezier(.4,0,.2,1);
}
#pageTransition.out{opacity:1;pointer-events:all}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(244,132,158,.3);border-radius:3px}
</style>
<script>
(function(){try{const c=JSON.parse(localStorage.getItem('mochi_assets')||'{}');if(c.bgVideo){const l=document.createElement('link');l.rel='preload';l.as='video';l.href=c.bgVideo;document.head.appendChild(l);}else if(c.bgImage){const l=document.createElement('link');l.rel='preload';l.as='image';l.href=c.bgImage;document.head.appendChild(l);}}catch{}})();
</script>
</head>
<body>

<div id="bgWrap">
  <video id="bgVideo" autoplay muted loop playsinline></video>
  <img id="bgImage" alt="배경">
  <div id="bgOverlay"></div>
</div>

<div id="pageTransition"></div>
<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- 네비 -->
<nav id="mainNav">
  <a href="index.html" class="nav-logo" onclick="goPage(event,'index.html')">
    <img id="navIcon" alt="모찌">
    <span class="nav-logo-text">모찌서버</span>
  </a>
  <ul class="nav-links">
    <li><a href="patchnote.html" class="active">소식</a></li>
    <li class="nav-keep"><a href="https://www.mochi.me.kr/law" target="_blank">법률 가이드</a></li>
    <li class="nav-keep"><a href="https://discord.gg/mochi-rp" target="_blank">디스코드</a></li>
  </ul>
  <button class="mob-menu-btn" id="mobMenuBtn" onclick="toggleMobMenu()">☰</button>

<script type="module">
const CACHE_KEY='mochi_assets';
const PATCH_KEY='mochi_patches_v4';
const PATCH_TTL=5*60*1000;
const TM={new:{cls:'t-new',label:'신규'},fix:{cls:'t-fix',label:'버그수정'},change:{cls:'t-change',label:'변경'},remove:{cls:'t-change',label:'삭제'}};
const PER_PAGE=9;
let allPatches=[],filtered=[],curFilter='all',curSearch='',curPage=1,iconUrl='',defaultThumbUrl='';

function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getTagInfo(tags){
  if(!tags||!tags.length) return {cls:'t-patch',label:'패치노트'};
  const t=tags[0];
  return TM[t]||{cls:'t-patch',label:'패치노트'};
}

function getThumbHtml(p,cls=''){
  const img=(p.blocks||[]).find(b=>b.type==='image');
  if(img) return`<img src="${esc(img.url)}" alt="" loading="lazy" class="${cls}" onerror="this.style.display='none'">`;
  if(defaultThumbUrl) return`<img src="${defaultThumbUrl}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
  return`<div class="${cls||'nc-thumb-ph'}" style="display:flex;align-items:center;justify-content:center;font-size:${cls?'52':'32'}px;opacity:.35;width:100%;height:100%;background:linear-gradient(135deg,rgba(244,132,158,.1),rgba(249,168,122,.07))">🫧</div>`;
}

function getDesc(p){
  const t=(p.blocks||[]).find(b=>b.type==='text');
  return(t?.text||'').replace(/[#*_>`\[\]]/g,'').substring(0,80);
}

function getDate(p){
  if(p.createdAt?.seconds) return new Date(p.createdAt.seconds*1000).toLocaleDateString('ko-KR');
  return p.date||'';
}

// 피처드 렌더
function renderFeatured(){
  if(!allPatches.length) return;
  const p=allPatches[0];
  const ti=getTagInfo(p.tags);
  const ft=document.getElementById('featuredTag');
  ft.textContent=ti.label; ft.className='featured-tag nc-tag '+ti.cls;
  document.getElementById('featuredDate').textContent=getDate(p);
  document.getElementById('featuredTitle').textContent=(p.ver||'')+' 패치노트';
  document.getElementById('featuredDesc').textContent=getDesc(p)||p.ver+' 패치노트를 안내드립니다.';
  const img=(p.blocks||[]).find(b=>b.type==='image');
  const thumb=document.getElementById('featuredThumb');
  if(img) thumb.innerHTML=`<img src="${esc(img.url)}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  else if(defaultThumbUrl) thumb.innerHTML=`<img src="${defaultThumbUrl}" alt="" style="width:100%;height:100%;object-fit:cover">`;
  else if(iconUrl) thumb.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(244,132,158,.12),rgba(249,168,122,.07))"><img src="${iconUrl}" style="width:90px;height:90px;object-fit:cover;border-radius:16px;opacity:.5"></div>`;
}

// 그리드 렌더
function renderGrid(){
  applyFilter();
  const total=Math.ceil(filtered.length/PER_PAGE)||1;
  if(curPage>total) curPage=total;
  const start=(curPage-1)*PER_PAGE;
  const items=filtered.slice(start,start+PER_PAGE);
  const grid=document.getElementById('newsGrid');
  if(!items.length){
    grid.innerHTML='<div style="grid-column:1/-1" class="empty-state"><div class="empty-state-ico">📋</div><div>소식이 없습니다.</div></div>';
  } else {
    grid.innerHTML=items.map(p=>{
      const ti=getTagInfo(p.tags);
      const idx=allPatches.indexOf(p);
      return`<div class="news-card" onclick="openDetail(${idx})">
        <div class="nc-thumb">${getThumbHtml(p)}</div>
        <div class="nc-body">
          <div class="nc-meta">
            <span class="nc-tag ${ti.cls}">${ti.label}</span>
            <span class="nc-date">${getDate(p)}</span>
          </div>
          <div class="nc-title">${esc(p.ver||'패치노트')}</div>
          <div class="nc-desc">${esc(getDesc(p))}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('pageInfo').textContent=`${curPage} / ${total}`;
  document.getElementById('prevBtn').disabled=curPage<=1;
  document.getElementById('nextBtn').disabled=curPage>=total;
}

function applyFilter(){
  filtered=allPatches.filter(p=>{
    const matchSearch=!curSearch||(p.ver||'').toLowerCase().includes(curSearch)||
      (p.blocks||[]).some(b=>(b.text||'').toLowerCase().includes(curSearch));
    return matchSearch;
  });
}

// 디테일 오픈
window.openDetail=(idx)=>{
  const p=allPatches[idx];
  if(!p) return;

  const ti=getTagInfo(p.tags);
  const dtag=document.getElementById('pmTag');
  dtag.textContent=ti.label; dtag.className='pm-tag nc-tag '+ti.cls;
  document.getElementById('pmDate').textContent=getDate(p);
  document.getElementById('pmTitle').textContent=p.ver||'패치노트';
  document.getElementById('pmVer').textContent=p.date||getDate(p);

  // 썸네일
  const img=(p.blocks||[]).find(b=>b.type==='image');
  const thumbWrap=document.getElementById('pmThumbWrap');
  if(img) thumbWrap.innerHTML=`<img src="${esc(img.url)}" alt="" style="width:100%;border-radius:16px;object-fit:cover;max-height:400px;border:1px solid rgba(255,255,255,.08)">`;
  else if(defaultThumbUrl) thumbWrap.innerHTML=`<img src="${defaultThumbUrl}" alt="" style="width:100%;border-radius:16px;object-fit:cover;max-height:400px;border:1px solid rgba(255,255,255,.08)">`;
  else if(iconUrl) thumbWrap.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:40px"><img src="${iconUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:14px;opacity:.4"></div>`;
  else thumbWrap.innerHTML='';

  // 콘텐츠 블록 → 마크다운 렌더
  const blocks=p.blocks||[];
  const CALLOUT_TYPES={warning:{cls:'callout-warning',ico:'⚠️'},info:{cls:'callout-info',ico:'ℹ️'},tip:{cls:'callout-tip',ico:'✅'},danger:{cls:'callout-danger',ico:'❌'}};
  let contentHtml=blocks.map(b=>{
    if(b.type==='text') return`<div>${typeof marked!=='undefined'?marked.parse(b.text||''):'<p>'+esc(b.text||'')+'</p>'}</div>`;
    if(b.type==='image') return`<p><img src="${esc(b.url||'')}" style="cursor:zoom-in" onclick="openLightbox('${esc(b.url||'')}')"></p>`;
    if(b.type==='callout'){const ct=CALLOUT_TYPES[b.callout_type||'warning']||CALLOUT_TYPES.warning;return`<div class="callout ${ct.cls}"><span style="font-size:18px;flex-shrink:0">${ct.ico}</span><div>${typeof marked!=='undefined'?marked.parse(b.text||''):'<p>'+esc(b.text||'')+'</p>'}</div></div>`;}
    return'';
  }).join('');
  if(!contentHtml) contentHtml='<p style="color:var(--mu)">내용이 없습니다.</p>';
  document.getElementById('pmContent').innerHTML=contentHtml;

  // 이전 패치노트 버튼
  const nav=document.getElementById('pmPrevBtn');
  if(idx+1<allPatches.length){
    const prev=allPatches[idx+1];
    nav.innerHTML=`<button style="padding:10px 22px;font-size:13px;border:none;cursor:pointer;background:rgba(255,255,255,.08);border-radius:100px;color:var(--mu2);font-family:inherit;font-weight:600;transition:all .15s" onclick="openDetail(${idx+1})">← ${esc(prev.ver||'')} 패치노트</button>`;
  } else nav.innerHTML='';

  // 모달 열기
  document.getElementById('patchModalOv').classList.add('open');
  document.body.style.overflow='hidden';
};

window.closeDetail=()=>{document.getElementById('patchModalOv').classList.remove('open');document.body.style.overflow='';};

window.setFilter=(f,el)=>{
  curFilter=f; curPage=1;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
};

window.setSearch=(v)=>{curSearch=v.toLowerCase().trim();curPage=1;renderGrid();};
window.changePage=(d)=>{curPage+=d;renderGrid();window.scrollTo({top:document.getElementById('filter-bar')?.offsetTop||400,behavior:'smooth'});};

// 라이트박스
window.openLightbox=(src)=>{document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';};
window.closeLightbox=()=>{document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeDetail();}});

// Firebase 로드
async function getCfg(){try{const r=await fetch('/api/config');return await r.json();}catch{return null;}}

// 패치노트 날짜 정렬 함수 - createdAt.seconds → date 문자열 순으로 fallback
function patchSort(a,b){
  // Firestore Timestamp 또는 직렬화된 {seconds, nanoseconds}
  const sa=a.createdAt?.seconds||0;
  const sb=b.createdAt?.seconds||0;
  if(sa!==sb) return sb-sa;
  // seconds가 같거나 없으면 date 문자열로 정렬
  // "2026-04-09 패치내역" 또는 "2026년 4월 9일" 형식 지원
  const parseDate=v=>{
    if(!v) return 0;
    const s=String(v);
    // 2026-04-09 형식
    const m1=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if(m1) return new Date(+m1[1],+m1[2]-1,+m1[3]).getTime();
    // 2026년 4월 9일 형식
    const m2=s.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if(m2) return new Date(+m2[1],+m2[2]-1,+m2[3]).getTime();
    return 0;
  };
  return parseDate(b.ver||b.date)-parseDate(a.ver||a.date);
}

async function init(){
  let assetCache={};
  try{assetCache=JSON.parse(localStorage.getItem(CACHE_KEY)||'{}');}catch{}
  const el=document.getElementById('navIcon');
  if(assetCache.icon){if(el){el.src=assetCache.icon;el.style.display='';}iconUrl=assetCache.icon;}
  if(assetCache.defaultThumb)defaultThumbUrl=assetCache.defaultThumb;
  else if(assetCache.bgImage)defaultThumbUrl=assetCache.bgImage;
  if(assetCache.bgVideo){document.getElementById('bgVideo').src=assetCache.bgVideo;document.getElementById('bgVideo').style.display='block';}
  else if(assetCache.bgImage){document.getElementById('bgImage').src=assetCache.bgImage;document.getElementById('bgImage').style.display='block';if(!defaultThumbUrl)defaultThumbUrl=assetCache.bgImage;}

  // 캐시된 패치노트 즉시 표시
  let cacheValid=false;
  try{
    const pc=JSON.parse(localStorage.getItem(PATCH_KEY)||'null');
    if(pc&&pc.data&&pc.data.length){
      allPatches=pc.data.sort(patchSort);
      renderFeatured();renderGrid();
      if(Date.now()-pc.ts<PATCH_TTL) cacheValid=true;
    }
  }catch{}

  const cfg=await getCfg();
  if(!cfg?.apiKey) return;

  const{initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const{getFirestore,collection,getDocs,query,orderBy}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const{getStorage,ref,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
  let app;try{app=initializeApp(cfg);}catch{try{app=initializeApp(cfg,'pn2');}catch{return;}}
  const db=getFirestore(app);const storage=getStorage(app);

  // assets - 404 났던 리소스는 다시 요청 안 함
  const assetP=(async()=>{
    const na={...assetCache,ts:Date.now()};
    try{const url=await getDownloadURL(ref(storage,'site/icon.png'));na.icon=url;iconUrl=url;if(el){el.src=url;el.style.display='';}renderFeatured();}catch{na.icon='_none_';}
    if(assetCache.defaultThumb!=='_none_'){try{const dt=await getDownloadURL(ref(storage,'site/default_thumb.png'));na.defaultThumb=dt;defaultThumbUrl=dt;renderFeatured();renderGrid();}catch{na.defaultThumb='_none_';}}
    if(assetCache.bgVideo!=='_none_'){try{const v=await getDownloadURL(ref(storage,'site/bg_video.mp4'));na.bgVideo=v;const ve=document.getElementById('bgVideo');if(!ve.src){ve.src=v;ve.style.display='block';}}
    catch{na.bgVideo='_none_';if(assetCache.bgImage!=='_none_'){try{const i=await getDownloadURL(ref(storage,'site/bg_image.jpg'));na.bgImage=i;const ie=document.getElementById('bgImage');if(!ie.src){ie.src=i;ie.style.display='block';}}catch{na.bgImage='_none_';}}}}
    localStorage.setItem(CACHE_KEY,JSON.stringify(na));
  })();

  // 패치노트
  if(!cacheValid){
    const patchP=(async()=>{
      try{
        const sn=await getDocs(collection(db,'patches'));
        allPatches=sn.docs.map(d=>({id:d.id,...d.data()})).sort(patchSort);
        localStorage.setItem(PATCH_KEY,JSON.stringify({ts:Date.now(),data:allPatches}));
        renderFeatured();renderGrid();
      }catch(e){if(!allPatches.length)document.getElementById('newsGrid').innerHTML='<div style="grid-column:1/-1" class="loading-state">패치노트를 불러오지 못했습니다.</div>';}
    })();
    await Promise.allSettled([assetP,patchP]);
  } else {
    await assetP;
  }
}
init();
</script>


<script>
(function(){
  // 페이지 진입 페이드인
  window.addEventListener('DOMContentLoaded',()=>{
    const ov=document.getElementById('pageTransition');
    if(!ov)return;
    ov.style.opacity='1';
    ov.style.pointerEvents='all';
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        ov.style.opacity='0';
        setTimeout(()=>{ov.style.pointerEvents='none';},460);
      });
    });
  });

  // goPage 전역 함수 (수동 호출용)
  window.goPage=(e,href)=>{
    if(e)e.preventDefault();
    const ov=document.getElementById('pageTransition');
    if(!ov){window.location.href=href;return;}
    ov.style.pointerEvents='all';
    ov.style.opacity='1';
    setTimeout(()=>window.location.href=href,460);
  };

  // 모든 내부 링크 자동 전환
  function attachTransitions(){
    document.querySelectorAll('a[href]').forEach(a=>{
      const href=a.getAttribute('href');
      if(!href||href.startsWith('#')||href.startsWith('http')||href.startsWith('fivem:')||href.startsWith('discord:')||a.target==="_blank"||a.hasAttribute('data-notrans')) return;
      if(a._transAttached) return;
      a._transAttached=true;
      a.addEventListener('click',e=>{
        e.preventDefault();
        window.goPage(null,href);
      });
    });
  }
  window.addEventListener('DOMContentLoaded',attachTransitions);
})();
</script>
